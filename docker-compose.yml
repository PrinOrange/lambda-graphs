services:
  lambda-graphs:
    build: .
    volumes:
      # Mount input files/folders directory
      - ./input:/input:ro
      # Mount output directory for generated graphs
      - ./output:/work/output
      # Mount temp directory for merged source files
      - ./temp:/work/temp
      # Persist tree-sitter grammars between runs
      - lambda-graphs-grammars:/tmp/lambda-graphs
    working_dir: /work

volumes:
  lambda-graphs-grammars:
